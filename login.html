<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse | Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box glass-card">
            <div class="login-header">
                <img src="Logo.jpeg" alt="Logo" class="login-logo">
                <h1>Welcome to <span>DevPulse</span></h1>
                <p>Enter your GBU credentials to continue</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="input-group">
                    <label><i class="fa-solid fa-user"></i> Full Name</label>
                    <input type="text" placeholder="Arya Sharma" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-id-card"></i> Roll Number</label>
                    <input type="text" placeholder="22/ICS/XXX" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-envelope"></i> GBU Email ID</label>
                    <input type="email" placeholder="name@gbu.ac.in" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Launch Dashboard</button>
            </form>
            
            <p class="footer-text">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
</body>
</html>

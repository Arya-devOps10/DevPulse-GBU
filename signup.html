<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse | Join Us</title>
    <link rel="stylesheet" href="login.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box glass-card" style="max-width: 500px; margin: 20px;">
            <div class="login-header">
                <img src="Logo.jpeg" alt="Logo" class="login-logo">
                <h1>Create <span>Account</span></h1>
                <p>Join the community and track your pulse</p>
            </div>

            <form action="login.html" method="GET">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label><i class="fa-solid fa-user"></i> Name</label>
                        <input type="text" placeholder="Arya" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fa-solid fa-graduation-cap"></i> Year and Section</label>
                        <input type="text" placeholder="CS 2nd Year" required>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-envelope"></i> GBU Email ID</label>
                    <input type="email" placeholder="arya.22ics@gbu.ac.in" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-shield-check"></i> Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Sign Up Now</button>
            </form>
            
            <p class="footer-text">Already a member? <a href="login.html">Log In</a></p>
        </div>
    </div>
</body>
</html>
